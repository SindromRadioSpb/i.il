# sources/registry.yaml — Sources registry (sources as code)
# Strategy: single-source ingestion from ynet news listing page.

version: 1
defaults:
  lang: he
  throttle:
    min_interval_sec: 10
    max_items_per_run: 50

sources:
  - id: ynet_news_page
    name: ynet news page
    type: html
    url: https://www.ynet.co.il/news
    lang: he
    enabled: true
    throttle:
      min_interval_sec: 10
      max_items_per_run: 50
    category_hints: [politics, security, economy, society, tech, health, culture, sport]
